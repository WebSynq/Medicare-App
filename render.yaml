# Render Blueprint — service-level config codified in repo.
#
# Scope (per 2026-05 IaC pass):
#   - plan, region, runtime, health-check path, graceful shutdown
#     window, and auto-deploy trigger live here so a fresh clone +
#     blueprint sync reproduces the production service shape.
#
# Out of scope (intentionally NOT in this file):
#   - Env vars (secrets stay in the Render dashboard only —
#     JWT_SECRET, STRIPE_SECRET_KEY, ANTHROPIC_API_KEY, GHL_*,
#     MONGO_URL, etc.).
#   - Database entries (MongoDB is Atlas, not a Render Postgres).
#   - buildCommand / startCommand / rootDir (left in the dashboard
#     so deploys keep working without this file having to change
#     every time the start path moves).
#
# Render-side precedence: fields set here override the dashboard;
# fields omitted here fall back to the dashboard config. The pre-
# 2026-05 blueprint that lived here had a stale service name +
# env var manifest + disk entry — all dropped.
services:
  - type: web
    name: ghw-medicare-backend
    runtime: python
    region: oregon
    plan: standard
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 120
    autoDeployTrigger: commit
